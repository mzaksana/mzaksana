name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: mzaksana/github-profile-3d-contrib@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Remove language pie chart from profile SVG
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("profile-3d-contrib/profile-green-animate.svg")
          if not path.exists():
              raise SystemExit(f"Missing SVG: {path}")

          text = path.read_text()
          # The pie chart group is anchored at translate(40, 520) in the default layout.
          needle = '<g transform="translate(40, 520)">'
          start = text.find(needle)
          if start == -1:
              raise SystemExit("Pie chart group not found")

          import re

          tag_end = text.find(">", start)
          if tag_end == -1:
              raise SystemExit("Malformed <g> tag in SVG")

          idx = tag_end + 1
          depth = 1
          open_re = re.compile(r"<g(?=\\s|>)")
          close_re = re.compile(r"</g>")
          while idx < len(text):
              open_match = open_re.search(text, idx)
              close_match = close_re.search(text, idx)
              if close_match is None:
                  raise SystemExit("Could not find closing </g> tag for pie chart group")

              if open_match and open_match.start() < close_match.start():
                  tag_end = text.find(">", open_match.start())
                  if tag_end == -1:
                      raise SystemExit("Malformed <g> tag in SVG")
                  is_self_closing = text[tag_end - 1] == "/"
                  if not is_self_closing:
                      depth += 1
                  idx = tag_end + 1
                  continue

              depth -= 1
              idx = close_match.end()
              if depth == 0:
                  end = idx
                  break
          else:
              raise SystemExit("Could not find closing </g> tag for pie chart group")

          path.write_text(text[:start] + text[end:])
          PY
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generated"
          git push
