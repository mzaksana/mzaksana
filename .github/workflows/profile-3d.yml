name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: mzaksana/github-profile-3d-contrib@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Remove language pie chart from profile SVG
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("profile-3d-contrib/profile-green-animate.svg")
          if not path.exists():
              raise SystemExit(f"Missing SVG: {path}")

          text = path.read_text()
          needle = '<g transform="translate(40, 520)">'
          start = text.find(needle)
          if start == -1:
              raise SystemExit("Pie chart group not found")

          idx = start
          depth = 0
          while idx < len(text):
              if text.startswith("<g>", idx) or text.startswith("<g ", idx):
                  depth += 1
                  tag_end = text.find(">", idx)
                  if tag_end == -1:
                      raise SystemExit("Malformed <g> tag in SVG")
                  idx = tag_end + 1
              elif text.startswith("</g>", idx):
                  depth -= 1
                  idx += 4
                  if depth == 0:
                      end = idx
                      break
              else:
                  idx += 1
          else:
              raise SystemExit("Unbalanced <g> tags in SVG")

          path.write_text(text[:start] + text[end:])
          PY
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generated"
          git push
